<section id="contacto" class="contact-section">
  <div class="contact-container">
    <div class="header-content">
      <h2 class="section-title">Hablemos de <span class="highlight">Negocios</span></h2>
      <p class="section-subtitle">Estamos listos para blindar tu contabilidad. Escríbenos y agenda una cita.</p>
    </div>

    <div class="contact-grid">
      <!-- FORMULARIO -->
      <form class="contact-form">
        <div class="input-group">
          <input type="text" placeholder="Nombre completo" required>
          <div class="input-glow"></div>
        </div>
        <div class="input-group">
          <input type="email" placeholder="Correo corporativo" required>
          <div class="input-glow"></div>
        </div>
        <div class="input-group">
          <textarea placeholder="¿En qué podemos ayudarte?" rows="5"></textarea>
          <div class="input-glow"></div>
        </div>
        <button type="submit" class="submit-btn">Enviar Mensaje</button>
      </form>

      <!-- MAPA CYBERPUNK CERCADO DE LIMA -->
      <div class="map-wrapper">
        <div class="map-card">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15606.015096181533!2d-77.0427!3d-12.0463!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c8d0e51376bf%3A0x6b447661b17e4719!2sCercado%20de%20Lima!5e0!3m2!1ses-419!2spe!4v1711111111111" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
          </iframe>
          <div class="map-overlay"></div>
        </div>
        <div class="address-box">
          <i class='bx bx-map-pin'></i>
          <span>Cercado de Lima, Perú</span>
        </div>
      </div>
    </div>
  </div>
</section>
